server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               model/gltf-binary model/gltf+json application/octet-stream
               image/svg+xml;

    # ── Hashed assets: aggressive cache (Vite fingerprints them) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static model/texture/sprite assets: cache 7d ─────────────
    location /assets/space/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Legal pages (static HTML — served directly, no SPA fallback) ──
    location = /privacy {
        rewrite ^ /privacy.html last;
    }
    location = /tos {
        rewrite ^ /tos.html last;
    }
    location = /privacy.html {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    location = /tos.html {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Admin page ───────────────────────────────────────
    location = /admin.html {
        try_files $uri =404;
    }
    location = /admin {
        rewrite ^ /admin.html last;
    }

    # ── Ship gallery ─────────────────────────────────────
    location = /ship-gallery {
        rewrite ^ /ship-gallery.html last;
    }
    location = /ship-gallery.html {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Favicons: serve directly, never fall to SPA ───────────
    location = /favicon.ico {
        rewrite ^ /favicon-32.png last;
    }
    location ~* ^/favicon.*\.(png|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location = /apple-touch-icon.png {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback: all other routes → index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
