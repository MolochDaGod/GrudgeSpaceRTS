// ── Loaders ─────────────────────────────────────────────────────
const objLoader = new OBJLoader();
const mtlLoader = new MTLLoader();
const fbxLoader = new FBXLoader();
const gltfLoader = new GLTFLoader();
const texLoader = new THREE.TextureLoader();

const shipMeshes = []; // { mesh, worldPos, ship }

async function loadShip(ship, xPos) {
  return new Promise((resolve) => {
    const onLoad = (obj) => {
      // Normalize scale: scale to fit a uniform bounding box, then multiply by tier-based size
      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      // Target display size scales with HP (logarithmic so big ships don't overwhelm)
      const targetSize = 2 + Math.log2(Math.max(ship.hp, 10)) * 1.5;
      const uniformScale = targetSize / maxDim;
      obj.scale.setScalar(uniformScale);

      // Center vertically
      const box2 = new THREE.Box3().setFromObject(obj);
      const center = new THREE.Vector3();
      box2.getCenter(center);
      obj.position.set(xPos, -center.y + 2, 0);

      // Apply texture if provided
      if (ship.tex) {
        const texture = texLoader.load(ship.tex);
        texture.colorSpace = THREE.SRGBColorSpace;
        obj.traverse(c => {
          if (c.isMesh) {
            c.material = new THREE.MeshStandardMaterial({ map: texture, metalness:0.4, roughness:0.6 });
          }
        });
      } else {
        obj.traverse(c => {
          if (c.isMesh && c.material) {
            if (Array.isArray(c.material)) {
              c.material.forEach(m => { m.metalness = 0.3; m.roughness = 0.6; });
            } else {
              c.material.metalness = 0.3;
              c.material.roughness = 0.6;
            }
          }
        });
      }

      scene.add(obj);
      shipMeshes.push({ mesh: obj, worldPos: new THREE.Vector3(xPos, 4, 0), ship });
      resolve(obj);
    };

    const onError = (err) => {
      console.warn(`Failed to load ${ship.name}:`, err);
      // Place a placeholder cube
      const geo = new THREE.BoxGeometry(2,2,2);
      const mat = new THREE.MeshStandardMaterial({ color: 0xff4444, wireframe:true });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(xPos, 2, 0);
      scene.add(mesh);
      shipMeshes.push({ mesh, worldPos: new THREE.Vector3(xPos, 4, 0), ship });
      resolve(mesh);
    };

    try {
      if (ship.fmt === 'fbx') {
        fbxLoader.load(ship.model, onLoad, undefined, onError);
      } else if (ship.fmt === 'glb') {
        gltfLoader.load(ship.model, (gltf) => onLoad(gltf.scene), undefined, onError);
      } else if (ship.fmt === 'obj' && ship.mtl) {
        mtlLoader.load(ship.mtl, (materials) => {
          materials.preload();
          const loader = new OBJLoader();
          loader.setMaterials(materials);
          loader.load(ship.model, onLoad, undefined, onError);
        }, undefined, () => {
          // MTL failed, try OBJ alone with texture
          objLoader.load(ship.model, onLoad, undefined, onError);
        });
      } else {
        objLoader.load(ship.model, onLoad, undefined, onError);
      }
    } catch(e) { onError(e); }
  });
}

// ── Load all ships ──────────────────────────────────────────────
let loaded = 0;
const SPACING = 12;
const startX = -(SHIPS.length * SPACING) / 2;

async function loadAll() {
  for (let i = 0; i < SHIPS.length; i++) {
    const x = startX + i * SPACING;
    await loadShip(SHIPS[i], x);
    loaded++;
    document.getElementById('count').textContent = `${loaded}/${SHIPS.length} loaded`;
  }
  document.getElementById('count').textContent = `${SHIPS.length} ships loaded — orbit to explore`;
  controls.target.set(0, 4, 0);
}

loadAll();

// ── Labels ──────────────────────────────────────────────────────
const labelsDiv = document.getElementById('labels');
function updateLabels() {
  labelsDiv.innerHTML = '';
  for (const { worldPos, ship } of shipMeshes) {
    const v = worldPos.clone().add(new THREE.Vector3(0, -4, 0));
    v.project(camera);
    if (v.z > 1) continue;
    const x = (v.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
    if (x < -100 || x > window.innerWidth+100 || y < -50 || y > window.innerHeight+50) continue;
    const el = document.createElement('div');
    el.className = 'label';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = TIER_COL[ship.tier] || '#fff';
    el.innerHTML = `${ship.name}<span class="tier">T${ship.tier} · ${ship.hp}HP</span>`;
    labelsDiv.appendChild(el);
  }
}

// ── Render loop ─────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  updateLabels();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

  const link = document.createElement('a');

  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
};

window.resetCamera = () => {
  camera.position.set(0, 30, 80);
